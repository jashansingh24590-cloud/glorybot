<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF GLORY BOT PRO 2026</title>
    <style>
        :root { --gold: #ffcc00; --red: #f85149; --green: #3fb950; --bg: #0d1117; --card: #161b22; }
        body { background-color: #010409; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 450px; margin: auto; }
        .glass-box { background: var(--card); border: 1px solid #30363d; border-radius: 16px; padding: 20px; margin-top: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #010409; color: white; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: #007bff; color: white; border: 1px solid #0056b3; }
        #step2, #mainPanel { display: none; }
        .status-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .bg-red { background: rgba(248,81,73,0.1); color: var(--red); border: 1px solid var(--red); }
        .bg-green { background: rgba(63,185,80,0.1); color: var(--green); border: 1px solid var(--green); }
        .glory-display { font-size: 36px; font-weight: 900; color: var(--red); margin: 15px 0; }
        .credit-progress { background: #010409; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        #progressBar { background: var(--gold); width: 0%; height: 100%; transition: 0.5s; }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="glass-box">
        <h2 style="color:var(--gold)">🔐 SECURE LOGIN</h2>
        <input type="password" id="passInput" placeholder="Enter Password (rocck31)">
        <button class="btn btn-gold" onclick="checkPass()">LOGIN</button>
    </div>

    <div id="step2" class="glass-box">
        <h2 style="color:var(--gold)">🤖 BOT SETUP</h2>
        <input type="number" id="guildInput" placeholder="Guild ID">
        <select id="regionSelect">
            <option value="INDIA">INDIA 🇮🇳</option>
            <option value="PAKISTAN">PAKISTAN 🇵🇰</option>
            <option value="BANGLADESH">BANGLADESH 🇧🇩</option>
        </select>
        <button class="btn btn-gold" onclick="showPanel()">ADD BOT</button>
    </div>

    <div id="mainPanel">
        <div class="glass-box">
            <div style="text-align:left; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:10px">
                <div style="color:var(--gold); font-weight:bold; font-size:18px" id="dispID">ID: 000000</div>
                <div style="font-size:12px; color:#888" id="dispReg">REGION: INDIA</div>
            </div>

            <div id="statusBox" class="status-badge bg-red">OFFLINE (WAIT FOR ADS)</div>

            <div style="text-align:left; margin: 15px 0;">
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px">
                    <span>CREDITS EARNED</span>
                    <span id="creditText">0/5 ADS</span>
                </div>
                <div class="credit-progress"><div id="progressBar"></div></div>
                
                <button id="adBtn" class="btn btn-blue" onclick="startAdTimer()">🎥 WATCH AD FOR CREDIT</button>
            </div>

            <div class="glory-display">GLORY: +<span id="gloryCount">0</span></div>

            <div style="display: flex; gap: 10px;">
                <button id="startBtn" class="btn btn-gold" style="opacity:0.3" disabled onclick="startBot()">START BOT</button>
                <button class="btn" style="background:#333; color:white;" onclick="location.reload()">STOP</button>
            </div>
        </div>
    </div>
</div>

<script>
    let credits = 0;
    let timerRunning = false;

    function checkPass() {
        if(document.getElementById('passInput').value === "rocck31") {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    function showPanel() {
        let id = document.getElementById('guildInput').value;
        if(id.length < 5) { alert("Invalid ID"); return; }
        document.getElementById('step2').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('dispID').innerText = "GUILD: " + id;
        document.getElementById('dispReg').innerText = "REGION: " + document.getElementById('regionSelect').value;
    }

    function startAdTimer() {
        if(timerRunning) return;
        
        // Ad khulegi
        window.open("https://www.profitablecpmratenetwork.com/p5s7vaxh?key=f93ff42ae54f7959783331fe87345820", "_blank");
        
        timerRunning = true;
        let timeLeft = 30; // 30 seconds ka timer
        let btn = document.getElementById('adBtn');
        
        btn.disabled = true;
        btn.style.background = "#555";
        
        let countdown = setInterval(() => {
            btn.innerText = "WAITING FOR AD... (" + timeLeft + "s)";
            timeLeft--;
            
            if(timeLeft < 0) {
                clearInterval(countdown);
                timerRunning = false;
                addCredit();
                btn.disabled = false;
                btn.style.background = "#007bff";
                btn.innerText = "🎥 WATCH AD FOR CREDIT";
            }
        }, 1000);
    }

    function addCredit() {
        if(credits < 5) {
            credits++;
            let percent = (credits / 5) * 100;
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('creditText').innerText = credits + "/5 ADS";
        }

        if(credits >= 5) {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').style.opacity = "1";
            document.getElementById('adBtn').innerText = "CREDITS COLLECTED ✅";
            document.getElementById('adBtn').disabled = true;
            document.getElementById('statusBox').className = "status-badge bg-green";
            document.getElementById('statusBox').innerText = "READY TO START";
        }
    }

    function startBot() {
        document.getElementById('statusBox').className = "status-badge bg-green";
        document.getElementById('statusBox').innerText = "RUNNING (ONLINE)";
        document.getElementById('startBtn').innerText = "ACTIVE...";
        document.getElementById('startBtn').disabled = true;
        
        let glory = 0;
        setInterval(() => {
            glory += 1;
            document.getElementById('gloryCount').innerText = glory;
        }, 1200); // 1 minute = 50 glory
    }
</script>
</body>
</html>
