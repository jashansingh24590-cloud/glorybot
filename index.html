<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Glory Bot 2026</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 420px; margin: auto; }
        .box { background: #1a1a1a; padding: 30px 20px; border-radius: 15px; border: 1px solid #333; margin-top: 30px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; text-align: center; }
        #step2, #mainPanel { display: none; }
        .guild-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 12px; text-align: left; margin-bottom: 15px; }
        .guild-img { width: 55px; height: 55px; background: #f0ad4e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 0 10px #f0ad4e; }
        .panel-area { background: #161b22; border-radius: 15px; padding: 15px; border: 1px solid #30363d; }
        .bot-card { background: #0d1117; border-radius: 10px; padding: 15px; text-align: left; border: 1px solid #30363d; }
        .btn { background: #ffcc00; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 15px; margin-top: 10px; transition: 0.3s; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .status-online { color: #3fb950; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        .glory-num { font-size: 32px; color: #f85149; font-weight: bold; margin: 10px 0; }
        .dot { height: 10px; width: 10px; background-color: #3fb950; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #3fb950; }
        .credit-box { color: #ffcc00; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="box">
        <h2 style="color: #ffcc00;">LOGIN BOT</h2>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button class="btn" onclick="checkPass()">LOGIN</button>
    </div>

    <div id="step2" class="box">
        <h2 style="color: #ffcc00;">BOT SETTINGS</h2>
        <input type="number" id="guildInput" placeholder="Enter Guild ID">
        <select id="regionSelect">
            <option value="INDIA">INDIA</option>
            <option value="PAKISTAN">PAKISTAN</option>
            <option value="BANGLADESH">BANGLADESH</option>
        </select>
        <button class="btn" onclick="showPanel()">ADD BOT</button>
    </div>

    <div id="mainPanel">
        <div class="guild-card">
            <div class="guild-img">🐯</div>
            <div class="guild-info">
                <span class="guild-name" id="displayID1" style="color:#ffcc00; font-weight:bold; font-size:18px;"></span>
                <div style="font-size: 11px; color: #8b949e; margin-top: 4px;">Region: <span id="displayRegion"></span> | 1 BOTS</div>
                <div style="font-size: 11px; margin-top: 5px;">STATUS: <span style="color:#3fb950">VERIFIED</span></div>
            </div>
        </div>

        <div class="panel-area">
            <div style="text-align: left; color: #58a6ff; font-size: 14px; margin-bottom: 10px; font-weight: bold;">MY ACTIVE GROUPS <span style="float:right; color:#f85149">Refresh ↺</span></div>
            <div class="bot-card">
                <span id="statusTxt" class="status-online" style="color: #f85149;"><span class="dot" style="background:#f85149"></span> OFFLINE (CREDITS NEEDED)</span>
                
                <div class="credit-box">CREDITS: <span id="creditVal">0</span>/5</div>
                
                <button id="adBtn" class="btn" style="background: #58a6ff; color: white;" onclick="watchAd()">WATCH AD FOR 1 CREDIT</button>
                
                <div class="glory-num">TOTAL GLORY: <span id="gloryCount">0</span></div>
                
                <div style="display: flex; gap: 10px;">
                    <button id="startBtn" class="btn" disabled onclick="startBot()">START BOT</button>
                    <button class="btn" style="background: #30363d; color: white;" onclick="location.reload()">STOP</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentCredits = 0;

    function checkPass() {
        if(document.getElementById('passInput').value === "rocck31") {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    function showPanel() {
        let id = document.getElementById('guildInput').value;
        if(id.length < 5) { alert("Enter Valid Guild ID!"); return; }
        document.getElementById('step2').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('displayID1').innerText = "GUILD: " + id;
        document.getElementById('displayRegion').innerText = document.getElementById('regionSelect').value;
    }

    function watchAd() {
        // Adsterra Link khulega
        window.open("https://www.profitablecpmratenetwork.com/p5s7vaxh?key=f93ff42ae54f7959783331fe87345820", "_blank");
        
        // Credit badhao
        if(currentCredits < 5) {
            currentCredits++;
            document.getElementById('creditVal').innerText = currentCredits;
        }

        // Agar 5 poore ho gaye toh Start button kholo
        if(currentCredits >= 5) {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').style.background = "#ffcc00";
            document.getElementById('adBtn').innerText = "5/5 CREDITS COLLECTED ✅";
            document.getElementById('adBtn').disabled = true;
            document.getElementById('statusTxt').style.color = "#ffcc00";
            document.getElementById('statusTxt').innerText = "● READY TO START";
        }
    }

    function startBot() {
        document.getElementById('statusTxt').innerText = "● RUNNING (ONLINE)";
        document.getElementById('statusTxt').style.color = "#3fb950";
        document.querySelector('.dot').style.background = "#3fb950";
        
        let glory = 0;
        // 1.2s per glory = 50 glory in 60s
        setInterval(() => {
            glory += 1;
            document.getElementById('gloryCount').innerText = glory;
        }, 1200); 
        document.getElementById('startBtn').innerText = "RUNNING...";
        document.getElementById('startBtn').disabled = true;
    }
</script>
</body>
</html>
